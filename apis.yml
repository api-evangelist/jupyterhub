aid: jupyterhub
name: JupyterHub
description: >-
  JupyterHub is a multi-user server for Jupyter notebooks. It manages
  authentication, spawns and proxies multiple instances of the
  single-user Jupyter notebook server, and exposes a REST API for
  managing users, groups, services, tokens, and the proxy.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Authentication
  - Data Science
  - Education
  - Hub
  - Multi-User
  - Notebooks
  - OAuth2
  - Python
url: https://raw.githubusercontent.com/api-evangelist/jupyterhub/refs/heads/main/apis.yml
created: '2024-01-01'
modified: '2026-04-28'
specificationVersion: '0.19'
apis:
  - aid: jupyterhub:jupyterhub-rest-api
    name: JupyterHub REST API
    description: >-
      REST API for managing users, groups, single-user servers, services,
      tokens, the proxy, and OAuth2 authorization in a JupyterHub
      deployment. Authenticated via API tokens or OAuth2.
    humanURL: https://jupyterhub.readthedocs.io/en/stable/reference/rest-api.html
    baseURL: http://localhost:8000/hub/api
    tags:
      - Authentication
      - Groups
      - OAuth2
      - REST API
      - Servers
      - Tokens
      - Users
    properties:
